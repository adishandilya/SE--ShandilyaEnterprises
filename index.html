<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHANDILYA ENTERPRISES</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f6f7fb;
color:#333;
}

/* HEADER */

header{
background:white;
padding:12px 15px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
position:sticky;
top:0;
z-index:100;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:45px;
border-radius:6px;
}

.logo h1{
font-size:18px;
}

.search{
width:40%;
}

.search input{
width:100%;
padding:8px 12px;
border-radius:20px;
border:1px solid #ddd;
}

.hero{
width:100%;
height:260px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:opacity .5s;
}

.filters{
display:flex;
gap:10px;
padding:15px;
justify-content:center;
flex-wrap:wrap;
}

.filters button{
border:none;
padding:8px 14px;
border-radius:20px;
background:#eee;
cursor:pointer;
font-size:13px;
}

.filters button.active{
background:#2d6cdf;
color:white;
}

/* PRODUCT GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.card h3{
font-size:14px;
margin-top:6px;
}

.price{
color:#e63946;
font-weight:600;
}

.addbtn{
width:100%;
margin-top:6px;
border:none;
background:#2d6cdf;
color:white;
padding:7px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

/* CART */

.cartBtn{
position:fixed;
right:20px;
bottom:20px;
background:#2d6cdf;
color:white;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:22px;
cursor:pointer;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

.count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

.cart{
position:fixed;
right:-400px;
top:0;
width:330px;
height:100%;
background:white;
padding:15px;
box-shadow:-3px 0 15px rgba(0,0,0,.15);
overflow:auto;
transition:.3s;
z-index:1000;
}

.cart.open{
right:0;
}

.cartItem{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
}

.qty button{
padding:2px 6px;
margin:0 2px;
}

.total{
font-weight:600;
margin:10px 0;
}

/* CHECKOUT */

.checkout input,
.checkout textarea{
width:100%;
margin:6px 0;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.checkout button{
width:100%;
border:none;
background:#28a745;
color:white;
padding:10px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

/* IMAGE ZOOM */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
left:20px;
bottom:20px;
background:#25D366;
color:white;
padding:12px 16px;
border-radius:30px;
text-decoration:none;
font-size:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

footer{
text-align:center;
padding:20px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="https://i.postimg.cc/wjh4Xqrk/Whats-App-Image-2026-03-08-at-4-42-29-PM.jpg">
<h1>SHANDILYA ENTERPRISES</h1>
</div>

<div class="search">
<input type="text" placeholder="Search poshaks..." onkeyup="searchProducts(this.value)">
</div>

</header>

<div class="hero">

<div class="slide" style="background-image:url('https://i.postimg.cc/3wrMW0w9/Gemini-Generated-Image-hcibhehcibhehcib.png')"></div>
<div class="slide" style="background-image:url('https://i.postimg.cc/76PRPFKP/Yellowred.jpg');opacity:0"></div>
<div class="slide" style="background-image:url('https://i.postimg.cc/5yTK36b2/pinkonly.jpg');opacity:0"></div>

</div>

<div class="filters">

<button class="active" onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('Laddu Gopal Poshak')">Laddu Gopal Poshak</button>

</div>

<div class="products" id="products"></div>

<div class="cartBtn" onclick="toggleCart()">
🛒
<span class="count" id="count">0</span>
</div>

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total" id="total"></div>

<button onclick="sendWhatsAppOrder()" style="background:#25D366;border:none;color:white;padding:10px;border-radius:8px;width:100%;margin-bottom:10px">
Order via WhatsApp
</button>

<form class="checkout" action="https://formspree.io/f/myknzbyz" method="POST" onsubmit="prepareEmailOrder()">

<input name="name" placeholder="Customer Name" required>
<input name="phone" placeholder="Phone Number" required>
<textarea name="address" placeholder="Delivery Address" required></textarea>
<textarea name="notes" placeholder="Special instructions"></textarea>

<input type="hidden" name="order_details" id="orderDetails">

<button type="submit">Place Order</button>

</form>

</div>

<div class="modal" id="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<a class="whatsapp" href="https://wa.me/919761133303">Chat on WhatsApp</a>

<footer>

Beautiful Poshaks for Your Beloved Laddu Gopal  
<br>
Lal Kurti, Chotta Bazar, Meerut Cantt  

</footer>

<script>

const products = [

{
name:"Yellow Red Floral Krishna Ji Poshak",
price:199,
cat:"Laddu Gopal Poshak",
img:"https://i.postimg.cc/76PRPFKP/Yellowred.jpg",
desc:"Bright yellow and red handcrafted floral poshak perfect for festive darshan."
},

{
name:"Multicolor Layered Krishna Ji Poshak",
price:219,
cat:"Laddu Gopal Poshak",
img:"https://i.postimg.cc/fRXp8j34/whitebluered.jpg",
desc:"Beautiful multi-layer poshak with blue, yellow and white petals for a divine festive look."
},

{
name:"Red White Designer Krishna Ji Poshak",
price:199,
cat:"Laddu Gopal Poshak",
img:"https://i.postimg.cc/k4wkxJ26/redwhite.jpg",
desc:"Elegant red and white designer poshak crafted with decorative net fabric for Thakur Ji."
},

{
name:"Sky Blue Lotus Style Krishna Ji Poshak",
price:189,
cat:"Laddu Gopal Poshak",
img:"https://i.postimg.cc/3J6QSxn3/bluewhite.jpg",
desc:"Sky blue lotus style poshak giving a royal and graceful appearance to Laddu Gopal."
},

{
name:"Pink Flower Premium Krishna Ji Poshak",
price:209,
cat:"Laddu Gopal Poshak",
img:"https://i.postimg.cc/5yTK36b2/pinkonly.jpg",
desc:"Soft pink floral poshak designed to give a charming and devotional look."
}

]
let cart=JSON.parse(localStorage.getItem("cart"))||[]

function renderProducts(list){

const container=document.getElementById("products")
container.innerHTML=""

list.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${p.img}" loading="lazy" onclick="zoom('${p.img}')">

<h3>${p.name}</h3>

<div class="price">₹${p.price}</div>

<button class="addbtn" onclick="addCart(${i})">Add to Cart</button>

</div>

`

})

}

function zoom(src){
document.getElementById("modal").style.display="flex"
document.getElementById("modalImg").src=src
}

function searchProducts(text){

text=text.toLowerCase()

renderProducts(products.filter(p=>p.name.toLowerCase().includes(text)))

}

function filterProducts(cat){

if(cat==="all") renderProducts(products)
else renderProducts(products.filter(p=>p.cat===cat))

}

function addCart(i){

let p=products[i]

let found=cart.find(x=>x.name===p.name)

if(found) found.qty++
else cart.push({...p,qty:1})

saveCart()

}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart))
renderCart()
}

function renderCart(){

let list=document.getElementById("cartItems")
list.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price*item.qty

list.innerHTML+=`

<div class="cartItem">

<div>${item.name}<br>₹${item.price} x ${item.qty}</div>

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
<button onclick="changeQty(${i},1)">+</button>
<button onclick="removeItem(${i})">x</button>
</div>

</div>

`

})

document.getElementById("count").innerText=cart.length
document.getElementById("total").innerText="Total: ₹"+total

}

function changeQty(i,v){
cart[i].qty+=v
if(cart[i].qty<=0) cart.splice(i,1)
saveCart()
}

function removeItem(i){
cart.splice(i,1)
saveCart()
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open")
}

function sendWhatsAppOrder(){

let msg="Hello, I want to order:%0A%0A"

cart.forEach(i=>{
msg+=`${i.name} x ${i.qty} = ₹${i.price*i.qty}%0A`
})

let total=cart.reduce((t,i)=>t+i.price*i.qty,0)

msg+=`%0ATotal: ₹${total}`

window.open("https://wa.me/919761133303?text="+msg)

}

function prepareEmailOrder(){

let summary="Order Details:%0A"

cart.forEach(i=>{
summary+=`${i.name} x ${i.qty} = ₹${i.price*i.qty}%0A`
})

document.getElementById("orderDetails").value=summary

localStorage.removeItem("cart")

alert("Order placed! We will contact you on WhatsApp.")

}

renderProducts(products)
renderCart()

/* HERO SLIDER */

let slides=document.querySelectorAll(".slide")
let index=0

setInterval(()=>{

slides[index].style.opacity=0

index=(index+1)%slides.length

slides[index].style.opacity=1

},4000)

</script>

</body>
</html>
